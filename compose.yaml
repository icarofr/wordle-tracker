services:
  caddy:
    image: caddy:2
    container_name: wordle-tracker-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./client/dist:/srv:ro
    depends_on:
      api:
        condition: service_healthy

  api:
    build: ./server
    container_name: wordle-tracker-api
    restart: unless-stopped
    environment:
      HTTP_PORT: "4000"
      DB_DSN: "${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-wordle-tracker}?sslmode=disable"
      DB_AUTOMIGRATE: "${DB_AUTOMIGRATE:-true}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8080}"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    container_name: wordle-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
      POSTGRES_DB: "${POSTGRES_DB:-wordle-tracker}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
