version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "assets/migrations/*.up.sql"
    queries:
      - "internal/postgres/queries"
    gen:
      go:
        package: "dbgen"
        out: "internal/postgres/dbgen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: false
