openapi: 3.0.3
info:
  title: Wordle Tracker API
  version: 1.0.0
  description: Private Wordle competition API for 2-6 players.

servers:
  - url: /

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    SessionUser:
      type: object
      x-go-type: auth.SessionUser
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/auth
      required: [id, name, email, avatar]
      properties:
        id:
          type: integer
          format: int64
          description: Unique user identifier.
        name:
          type: string
          description: Display name.
        email:
          type: string
          description: Email address.
        avatar:
          type: string
          description: Avatar identifier ("01" through "25").

    PublicUser:
      type: object
      x-go-type: users.User
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/users
      required: [id, name, avatar]
      properties:
        id:
          type: integer
          format: int64
          description: Unique user identifier.
        name:
          type: string
          description: Display name.
        avatar:
          type: string
          description: Avatar identifier ("01" through "25").

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/SessionUser'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: User email address.
        password:
          type: string
          minLength: 1
          description: User password.
        remember_me:
          type: boolean
          description: Whether to issue a long-lived token.

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
          description: Display name for the new user.
        email:
          type: string
          format: email
          description: Email address (must be unique).
        password:
          type: string
          minLength: 8
          description: Password (minimum 8 characters).

    UpdateAvatarRequest:
      type: object
      required: [avatar]
      properties:
        avatar:
          type: string
          pattern: "^(0[1-9]|1[0-9]|2[0-5])$"
          description: Avatar ID, "01" through "25".

    WordleStats:
      type: object
      x-go-type: wordles.Stats
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [games, wins, fails, average_score, win_percentage, distribution, current_streak, max_streak]
      properties:
        games:
          type: integer
          format: int64
          description: Total number of Wordle games played.
        wins:
          type: integer
          format: int64
          description: Number of games won (score 1-6).
        fails:
          type: integer
          format: int64
          description: Number of games lost (score X).
        average_score:
          type: number
          format: double
          description: Mean score across all games (X counts as 7).
        win_percentage:
          type: number
          format: double
          description: Percentage of games won (0-100).
        distribution:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: 'Score distribution — keys are "1" through "6" and "X".'
        current_streak:
          type: integer
          format: int64
          description: Current consecutive-win streak.
        max_streak:
          type: integer
          format: int64
          description: Longest consecutive-win streak ever.

    WordleEntry:
      type: object
      x-go-type: wordles.Entry
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [id, wordle_id, score, raw_input, created_at]
      properties:
        id:
          type: integer
          format: int64
          description: Unique entry identifier.
        wordle_id:
          type: integer
          format: int32
          description: Wordle puzzle number.
        score:
          type: string
          description: 'Result score: "1"-"6" or "X".'
        raw_input:
          type: string
          description: Original pasted Wordle share text.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the entry was submitted.

    WordleSubmitRequest:
      type: object
      required: [raw_input]
      properties:
        raw_input:
          type: string
          description: Pasted Wordle share text to parse and record.

    ArchiveEntryInfo:
      type: object
      x-go-type: wordles.ArchiveEntry
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [score, created_at]
      properties:
        score:
          type: string
          description: 'Result score: "1"-"6" or "X".'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the entry was submitted.
        raw_input:
          type: string
          description: Original pasted Wordle share text.

    ArchiveSummary:
      type: object
      x-go-type: wordles.ArchiveSummary
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [best_score, best_count, solved_count, failed_count]
      properties:
        best_score:
          type: string
          description: Best score among all participants for this puzzle.
        best_count:
          type: integer
          format: int64
          description: Number of participants tied for the best score.
        solved_count:
          type: integer
          format: int64
          description: Number of participants who solved the puzzle.
        failed_count:
          type: integer
          format: int64
          description: Number of participants who failed the puzzle.

    ArchiveListItem:
      type: object
      x-go-type: wordles.ArchiveListItem
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [wordle_id, participant_count, viewer_has_played]
      properties:
        wordle_id:
          type: integer
          format: int32
          description: Wordle puzzle number.
        participant_count:
          type: integer
          format: int64
          description: Number of users who submitted a result for this puzzle.
        viewer_has_played:
          type: boolean
          description: Whether the authenticated user has submitted a result.
        viewer_entry:
          $ref: '#/components/schemas/ArchiveEntryInfo'
        summary:
          $ref: '#/components/schemas/ArchiveSummary'

    ArchiveListPage:
      type: object
      x-go-type: wordles.ArchiveListPage
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [self, items]
      properties:
        self:
          type: string
          description: Absolute URI of the current page.
        next:
          type: string
          description: Absolute URI of the next page, absent if no more results.
        items:
          type: array
          description: Wordle archive entries for this page.
          items:
            $ref: '#/components/schemas/ArchiveListItem'

    ArchiveStanding:
      type: object
      x-go-type: wordles.ArchiveStanding
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [user, entry]
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
        entry:
          $ref: '#/components/schemas/ArchiveEntryInfo'

    ArchiveWordle:
      type: object
      x-go-type: wordles.ArchiveDetail
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [wordle_id, total_users, played_count, pending_count, viewer_has_played, standings, waiting_players]
      properties:
        wordle_id:
          type: integer
          format: int32
          description: Wordle puzzle number.
        total_users:
          type: integer
          format: int64
          description: Total number of registered users.
        played_count:
          type: integer
          format: int64
          description: Number of users who have submitted a result.
        pending_count:
          type: integer
          format: int64
          description: Number of users who have not yet submitted.
        viewer_has_played:
          type: boolean
          description: Whether the authenticated user has submitted a result.
        viewer_entry:
          $ref: '#/components/schemas/ArchiveEntryInfo'
        standings:
          type: array
          description: Participants sorted by score.
          items:
            $ref: '#/components/schemas/ArchiveStanding'
        waiting_players:
          type: array
          description: Users who have not yet submitted.
          items:
            $ref: '#/components/schemas/PublicUser'

    HeadToHeadRecord:
      type: object
      x-go-type: wordles.HeadToHeadRecord
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [total_games, wins, losses, ties, win_percentage]
      properties:
        total_games:
          type: integer
          format: int64
          description: Total number of shared Wordle puzzles.
        wins:
          type: integer
          format: int64
          description: Games won against the opponent.
        losses:
          type: integer
          format: int64
          description: Games lost against the opponent.
        ties:
          type: integer
          format: int64
          description: Games tied with the opponent.
        win_percentage:
          type: number
          format: double
          description: Percentage of shared games won (0-100).

    RecentMatch:
      type: object
      x-go-type: wordles.RecentMatch
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [wordle_id, self_score, opponent_score, played_at, result]
      properties:
        wordle_id:
          type: integer
          format: int32
          description: Wordle puzzle number.
        self_score:
          type: string
          description: Authenticated user's score for this puzzle.
        opponent_score:
          type: string
          description: Opponent's score for this puzzle.
        played_at:
          type: string
          format: date-time
          description: Timestamp of the most recent submission for this puzzle.
        result:
          type: string
          enum: [WIN, LOSS, TIE]
          description: Outcome from the authenticated user's perspective.

    HeadToHeadStats:
      type: object
      required: [opponent, record, stats, recent_matches]
      properties:
        opponent:
          $ref: '#/components/schemas/PublicUser'
        record:
          $ref: '#/components/schemas/HeadToHeadRecord'
        stats:
          type: object
          description: Wordle stats scoped to shared puzzles only.
          required: [self, opponent]
          properties:
            self:
              $ref: '#/components/schemas/WordleStats'
            opponent:
              $ref: '#/components/schemas/WordleStats'
        recent_matches:
          type: array
          description: Most recent head-to-head matches.
          items:
            $ref: '#/components/schemas/RecentMatch'

    LeaderboardEntry:
      type: object
      x-go-type: wordles.LeaderboardEntry
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [player, total_games, average_score, win_percentage, current_streak, max_streak]
      properties:
        player:
          $ref: '#/components/schemas/PublicUser'
        total_games:
          type: integer
          format: int64
          description: Total number of shared Wordle games played.
        average_score:
          type: number
          format: double
          description: Mean score across shared games (X counts as 7).
        win_percentage:
          type: number
          format: double
          description: Percentage of shared games won (0-100).
        current_streak:
          type: integer
          format: int64
          description: Current consecutive-win streak.
        max_streak:
          type: integer
          format: int64
          description: Longest consecutive-win streak ever.

    LeaderboardData:
      type: object
      x-go-type: wordles.LeaderboardData
      x-go-type-import:
        path: github.com/icarofr/wordle-tracker/internal/wordles
      required: [shared_wordles, items]
      properties:
        shared_wordles:
          type: integer
          format: int64
          description: Number of Wordle puzzles where all players participated.
        items:
          type: array
          description: Leaderboard entries sorted by rank.
          items:
            $ref: '#/components/schemas/LeaderboardEntry'

    FieldError:
      type: object
      properties:
        field:
          type: string
          description: The name of the field that failed validation.
        detail:
          type: string
          description: Human-readable description of the validation failure.
      required: [field, detail]

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          description: A URI reference identifying the problem type.
        title:
          type: string
          description: A short human-readable summary.
        status:
          type: integer
          format: int32
          description: The HTTP status code.
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          description: A URI reference identifying the specific occurrence (request path).
        errors:
          type: array
          description: Field-level validation errors.
          items:
            $ref: '#/components/schemas/FieldError'
      required: [type, title, status]

paths:
  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /sessions:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      description: |
        Authenticates with email and password. Sets an HttpOnly cookie for subsequent requests.

        Problem types: `/problems/validation-error`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Invalid credentials
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /sessions/current:
    delete:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Logged out
        '401':
          description: Not authenticated

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PublicUser'
        '401':
          description: Not authenticated

    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      description: |
        Creates a new user account. Sets an HttpOnly cookie for subsequent requests.

        Problem types: `/problems/validation-error`, `/problems/email-taken`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Email already taken
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /users/self:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current authenticated user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
        '401':
          description: Not authenticated

    patch:
      operationId: updateAvatar
      tags: [users]
      summary: Update current user avatar
      description: |
        Updates the authenticated user's avatar.

        Problem types: `/problems/validation-error`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAvatarRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
        '400':
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Not authenticated

  /users/self/stats:
    get:
      operationId: getMyStats
      tags: [wordles]
      summary: Get current user stats
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordleStats'
        '401':
          description: Not authenticated

  /users/{userID}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      security:
        - BearerAuth: []
      parameters:
        - name: userID
          in: path
          required: true
          description: Numeric user identifier.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '401':
          description: Not authenticated
        '404':
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /users/{userID}/stats:
    get:
      operationId: getUserStats
      tags: [wordles]
      summary: Get stats for a specific user
      security:
        - BearerAuth: []
      parameters:
        - name: userID
          in: path
          required: true
          description: Numeric user identifier.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordleStats'
        '401':
          description: Not authenticated
        '404':
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /users/self/head-to-heads/{userID}:
    get:
      operationId: getHeadToHead
      tags: [head-to-head]
      summary: Get head-to-head stats against an opponent
      description: |
        Returns head-to-head record, stats, and recent matches against the specified opponent.

        Problem types: `/problems/self-comparison`.
      security:
        - BearerAuth: []
      parameters:
        - name: userID
          in: path
          required: true
          description: Numeric user identifier.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Head-to-head stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeadToHeadStats'
        '400':
          description: Invalid opponent (e.g., comparing with yourself)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Not authenticated
        '404':
          description: Opponent not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /wordle-submissions:
    post:
      operationId: submitWordle
      tags: [wordles]
      summary: Submit a Wordle result
      description: |
        Parses a pasted Wordle share text and records the result.

        Problem types: `/problems/invalid-wordle`, `/problems/duplicate-submission`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WordleSubmitRequest'
      responses:
        '201':
          description: Submission accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordleEntry'
        '400':
          description: Invalid format or validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Not authenticated
        '409':
          description: Duplicate submission
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /wordles:
    get:
      operationId: getArchive
      tags: [wordles]
      summary: Get wordle archive (paginated)
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of items to return per page.
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          description: Opaque, base64-encoded cursor for pagination. Omit for the first page.
          schema:
            type: string
      responses:
        '200':
          description: Archive page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchiveListPage'
        '401':
          description: Not authenticated

  /wordles/{wordleID}:
    get:
      operationId: getArchiveWordle
      tags: [wordles]
      summary: Get a single wordle with standings
      security:
        - BearerAuth: []
      parameters:
        - name: wordleID
          in: path
          required: true
          description: Wordle puzzle number.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Wordle detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchiveWordle'
        '401':
          description: Not authenticated
        '404':
          description: Wordle not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /leaderboards/current:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get current leaderboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardData'
        '401':
          description: Not authenticated


